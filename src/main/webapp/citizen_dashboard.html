<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Citizen Dashboard - Disaster Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .dashboard-scroll {
            max-height: 260px;
            overflow-y: auto;
        }

        .dashboard-scroll thead th {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12) !important;
        }

        .btn {
            transition: all 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .form-control,
        .form-select {
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.12);
        }

        .submit-btn {
            background-color: #2fbf71;
            border: none;
            color: white;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #28a862;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(47, 191, 113, 0.35);
        }

        #description::placeholder {
            font-style: italic;
            color: #6c757d;
            opacity: 0.7;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Citizen Dashboard</a>
            <div class="d-flex align-items-center gap-3">
                <span id="userName" class="text-white fw-semibold"></span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <div class="row g-4">

            <div class="col-12">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body">
                        <h2 class="card-title mb-3">Active Disasters</h2>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle" id="disasterTable">
                                <thead class="table-danger">
                                    <tr>
                                        <th>ID</th>
                                        <th>Type</th>
                                        <th>Location</th>
                                        <th>Severity</th>
                                        <th>Status</th>
                                        <th>Description</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-5">
                <div class="card shadow border-0 rounded-4 h-100">
                    <div class="card-body">
                        <h2 class="card-title mb-3">Request Help</h2>
                        <p class="text-muted small">You can type manually or tap the microphone button to speak.</p>

                        <form id="helpForm">
                            <div class="mb-3">
                                <label for="disasterSelect" class="form-label">Select Disaster</label>
                                <select id="disasterSelect" class="form-select" required></select>
                            </div>

                            <div class="mb-3">
                                <label for="location" class="form-label">Your Exact Location (with Pincode)</label>
                                <div class="input-group">
                                    <input type="text" id="location" class="form-control" required>
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="startVoiceInput('location')">🎤</button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Describe Your Need</label>
                                <div class="input-group">
                                    <textarea id="description" rows="4" class="form-control"
                                        placeholder="e.g. We need supply of drinking water or medical help."
                                        required></textarea>
                                    <button type="button" class="btn btn-outline-secondary"
                                        onclick="startVoiceInput('description')">🎤</button>
                                </div>
                            </div>
                            <button type="submit" class="btn submit-btn w-100 btn-lg">
                                Submit Request
                            </button>
                        </form>

                        <p id="msg" class="mt-2 mb-0 fw-semibold"></p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-7">
                <div class="card shadow border-0 rounded-4 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="card-title mb-0">My Help Requests</h2>
                            <small class="text-muted">Scroll to view all my help requests</small>
                        </div>

                        <div class="table-responsive dashboard-scroll">
                            <table class="table table-bordered table-hover align-middle mb-0" id="myRequestsTable">
                                <thead class="table-primary">
                                    <tr>
                                        <th>ID</th>
                                        <th>Disaster</th>
                                        <th>Location</th>
                                        <th>Status</th>
                                        <th>Assigned Team</th>
                                        <th>Description</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function checkAuth() {
            fetch('auth')
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success' || data.role !== 'Citizen') {
                        window.location.href = 'login.html';
                        return;
                    }
                    document.getElementById('userName').innerText = 'Welcome, ' + data.name;
                });
        }

        function logout() {
            fetch('auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'action=logout'
            }).then(() => window.location.href = 'login.html');
        }

        function startVoiceInput(fieldId) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                alert('Voice input is not supported in this browser. Please use Google Chrome.');
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-IN';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.start();

            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript.trim();
                const field = document.getElementById(fieldId);

                if (field) {
                    field.value = transcript;
                }
            };

            recognition.onerror = function () {
                alert('Voice input failed. Please try again.');
            };
        }

        function getDisasterStatusBadge(status) {
            if (status === 'Reported') return '<span class="badge bg-primary">Reported</span>';
            if (status === 'In Progress') return '<span class="badge bg-warning text-dark">In Progress</span>';
            if (status === 'Resolved') return '<span class="badge bg-success">Resolved</span>';
            return `<span class="badge bg-dark">${status}</span>`;
        }

        function getRequestStatusBadge(status) {
            if (status === 'Pending') return '<span class="badge bg-primary">Pending</span>';
            if (status === 'Assigned') return '<span class="badge bg-warning text-dark">Assigned</span>';
            if (status === 'Resolved') return '<span class="badge bg-success">Resolved</span>';
            return `<span class="badge bg-dark">${status}</span>`;
        }

        function loadDisasters() {
            fetch('disaster')
                .then(r => r.json())
                .then(data => {
                    const rows = data.map(d => `
                        <tr>
                            <td>${d.id}</td>
                            <td>${d.type}</td>
                            <td>${d.location}</td>
                            <td>${d.severity}</td>
                            <td>${getDisasterStatusBadge(d.status)}</td>
                            <td>${d.description}</td>
                        </tr>
                    `).join('');

                    document.getElementById('disasterTable').innerHTML = `
                        <thead class="table-danger">
                            <tr>
                                <th>ID</th>
                                <th>Type</th>
                                <th>Location</th>
                                <th>Severity</th>
                                <th>Status</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    `;

                    const selectMap = data
                        .filter(d => d.status === 'Reported' || d.status === 'In Progress')
                        .map(d => `<option value="${d.id}">${d.type} - ${d.location}</option>`)
                        .join('');

                    document.getElementById('disasterSelect').innerHTML =
                        selectMap || '<option value="">No active disasters available</option>';
                });
        }

        document.getElementById('helpForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const did = document.getElementById('disasterSelect').value;
            const loc = document.getElementById('location').value;
            const desc = document.getElementById('description').value;
            const msg = document.getElementById('msg');

            fetch('help-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    action: 'raise',
                    disasterId: did,
                    location: loc,
                    description: desc
                })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        msg.innerText = 'Request submitted successfully!';
                        msg.className = 'mt-2 mb-0 fw-semibold text-success';
                        document.getElementById('helpForm').reset();
                        loadMyRequests();
                    } else {
                        msg.innerText = 'Error submitting request.';
                        msg.className = 'mt-2 mb-0 fw-semibold text-danger';
                    }
                })
                .catch(() => {
                    msg.innerText = 'Server error.';
                    msg.className = 'mt-2 mb-0 fw-semibold text-danger';
                });
        });

        function loadMyRequests() {
            fetch('help-request')
                .then(r => r.json())
                .then(data => {
                    const rows = data.map(hr => `
                        <tr>
                            <td>${hr.id}</td>
                            <td>${hr.disasterType}</td>
                            <td>${hr.location}</td>
                            <td>${getRequestStatusBadge(hr.status)}</td>
                            <td>${hr.assignedTeam || 'Not assigned yet'}</td>
                            <td>${hr.description}</td>
                        </tr>
                    `).join('');

                    document.getElementById('myRequestsTable').innerHTML = `
                        <thead class="table-primary">
                            <tr>
                                <th>ID</th>
                                <th>Disaster</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Assigned Team</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    `;
                });
        }

        window.onload = function () {
            checkAuth();
            loadDisasters();
            loadMyRequests();
        };
    </script>

</body>

</html>
